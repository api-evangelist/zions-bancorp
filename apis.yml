apis:
  - aid: zions-bancorp:treasury-internet-banking
    name: Zions Treasury Internet Banking
    description: >-
      Zions Treasury Internet Banking provides businesses with a secure online
      platform for managing treasury operations including ACH payments, domestic
      and international wire transfers, account transfers, positive pay, and
      real-time cash position visibility. Supports ERP integration via import
      and export of standard file formats for automated payment origination
      and reconciliation.
    humanURL: https://www.zionsbank.com/business/treasury/treasury-internet-banking/
    tags:
      - Treasury Management
      - ACH
      - Wire Transfers
      - Cash Management
      - Banking
    properties:
      - type: Documentation
        url: https://www.zionsbank.com/business/treasury/
      - type: Login
        url: https://treasurygateway.zionsbank.com/
  - aid: zions-bancorp:ach-payments
    name: Zions ACH Payments
    description: >-
      Zions ACH Payments is a payment disbursement solution enabling businesses
      to pay employees, suppliers, vendors, and tax agencies via ACH. Supports
      import and export file formats for integration with accounting and ERP
      software, making cash flow management more efficient, predictable, and
      cost effective.
    humanURL: https://www.zionsbank.com/business/treasury/treasury-management-select/ach-payments/
    tags:
      - ACH
      - Payments
      - Treasury Management
      - Banking
    properties:
      - type: Documentation
        url: https://www.zionsbank.com/business/treasury/treasury-management-select/ach-payments/
  - aid: zions-bancorp:wire-transfers
    name: Zions Wire Transfer Services
    description: >-
      Zions Wire Transfer Services enables businesses to send domestic and
      international wire transfers efficiently. Supports foreign currency
      transfers to more than 60 countries worldwide. Available through
      Treasury Internet Banking for streamlined origination and status tracking.
    humanURL: https://www.zionsbank.com/business/treasury/disbursements/wire-transfers/
    tags:
      - Wire Transfers
      - International Payments
      - Banking
      - Treasury Management
    properties:
      - type: Documentation
        url: https://www.zionsbank.com/business/treasury/disbursements/wire-transfers/
