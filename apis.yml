aid: zions-bancorp
name: Zions Bancorporation
description: >-
  Zions Bancorporation is one of the nation's premier financial services companies,
  operating under local management teams and distinct brands in 11 western U.S. states.
  The company offers a comprehensive suite of banking, treasury management, lending,
  and wealth management services for individuals, businesses, and public sector clients.
  Zions provides ERP-to-bank integration capabilities, ACH payment origination, wire
  transfers, and cash management tools for corporate treasury operations. The company
  does not currently publish a public REST API developer portal; integrations are
  delivered via Treasury Internet Banking import/export, NACHA-compliant ACH files,
  and direct file-transfer arrangements with corporate customers.
